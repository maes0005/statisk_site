<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="js/productlist.js" defer></script>
    <title>Products By Category</title>
  </head>
  <body class="productlist">
    <header class="mainNav">
      <a href="index.html">
        <img src="img/logo.png" alt="Logo" class="logo" />
      </a>
      <nav>
        <a href="#">Categories</a>
        <a href="#">Brands</a>
        <a href="#">Seasons</a>
      </nav>
    </header>
    <main>
      <h2>Apparel</h2>

      <div class="filters">
        <button>All</button>
        <button>Unisex</button>
        <button>Women</button>
        <button>Men</button>
      </div>

      <div>
        <button data-text="az">A-Z</button>
        <button data-text="za">Z-A</button>
        <button data-price="up">Lav-høj</button>
        <button data-price="down">Høj-lav</button>
      </div>

      <section class="productContainer"></section>
    </main>
  </body>
</html>
